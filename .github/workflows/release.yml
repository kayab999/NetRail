name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend tooling
        run: npm ci

      - name: Build headless API binary
        working-directory: src-tauri
        run: cargo build --release --bin netrail-api --no-default-features

      - name: Build Tauri desktop bundle
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npm run build

      - name: Collect release artifacts
        run: |
          mkdir -p dist/release
          cp src-tauri/target/release/netrail-api dist/release/
          find src-tauri/target/release/bundle -type f \( -name '*.AppImage' -o -name '*.deb' \) -exec cp {} dist/release/ \;
          ls -lh dist/release/

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: NetRail v1.0.0 — The Sovereign Search Console
          body_path: docs/RELEASE_v1.0.0.md
          files: dist/release/*
          generate_release_notes: false