name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend tooling
        run: npm ci

      - name: Run tests
        run: |
          python -m pip install -r requirements.txt
          python -m pytest tests/ -q
          cd src-tauri && cargo test

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Build headless API binary
        working-directory: src-tauri
        run: cargo build --release --bin netrail-api --no-default-features

      - name: Build Tauri desktop bundle
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npm run build

      - name: Collect release artifacts
        run: |
          mkdir -p dist/release
          cp src-tauri/target/release/netrail-api dist/release/
          find src-tauri/target/release/bundle -type f \( -name '*.AppImage' -o -name '*.deb' \) -exec cp {} dist/release/ \;
          ls -lh dist/release/

      - name: Generate SHA256 checksums
        run: |
          cd dist/release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Resolve release notes path
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -f "docs/RELEASE_${TAG}.md" ]; then
            echo "path=docs/RELEASE_${TAG}.md" >> "$GITHUB_OUTPUT"
          else
            echo "path=docs/RELEASE_v1.0.0.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: NetRail ${{ github.ref_name }} — The Sovereign Search Console
          body_path: ${{ steps.notes.outputs.path }}
          files: dist/release/*
          generate_release_notes: true